<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistaar Traffic Command | Cop Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --green: #22c55e;
            --red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .device {
            width: 380px; height: 800px; background: var(--panel); border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 8px solid #334155;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        .status-bar { padding: 15px 20px; font-size: 0.8rem; display: flex; justify-content: space-between; color: #94a3b8; }
        
        /* Idle State */
        .idle-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .idle-screen h2 { color: #334155; font-size: 1.2rem; }

        /* Call Screen */
        .call-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            display: none; flex-direction: column; align-items: center; padding-top: 100px;
            z-index: 10;
        }

        .avatar {
            width: 120px; height: 120px; border-radius: 50%; background: #38bdf8;
            display: flex; justify-content: center; align-items: center; font-size: 3rem;
            margin-bottom: 30px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { box-shadow: 0 0 0 30px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        .caller-id { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .call-status { color: #38bdf8; font-size: 1.1rem; margin-bottom: 40px; }
        
        .urgent-msg {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 20px; border-radius: 12px; text-align: center; width: 85%; line-height: 1.5;
            color: #fca5a5; margin-bottom: auto;
        }

        .actions {
            display: flex; justify-content: space-around; width: 100%; padding: 40px; margin-top: auto;
        }

        .btn-call {
            width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 2rem; color: white;
            transition: transform 0.2s;
        }
        .btn-call:active { transform: scale(0.9); }
        
        .btn-decline { background: var(--red); }
        .btn-answer { background: var(--green); animation: jiggle 2s infinite; }

        @keyframes jiggle {
            0% { transform: rotate(0); }
            10% { transform: rotate(-15deg); }
            20% { transform: rotate(15deg); }
            30% { transform: rotate(-15deg); }
            40% { transform: rotate(15deg); }
            50% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }

    </style>
</head>
<body>
    <div class="device">
        <div class="status-bar">
            <span>Vistaar Secure Net</span>
            <span>100% 🔋</span>
        </div>

        <div class="idle-screen" id="idle">
            <h2>Waiting for Dispatch...</h2>
        </div>

        <div class="call-screen" id="call">
            <div class="avatar">🚨</div>
            <div class="caller-id">Traffic Command</div>
            <div class="call-status">Incoming Priority Burst...</div>

            <div class="urgent-msg">
                <strong>TMT-TOKEN ACTIVE</strong><br><br>
                Ambulance approaching in 4 mins.<br>
                Please clear Lane 1 immediately.
            </div>

            <div class="actions">
                <button class="btn-call btn-decline" onclick="declineCall()">✖</button>
                <button class="btn-call btn-answer" onclick="answerCall()">📞</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        socket.on('incoming_cop_call', (data) => {
            document.getElementById('idle').style.display = 'none';
            document.getElementById('call').style.display = 'flex';
        });

        function answerCall() {
            socket.emit('cop_call_accepted', { node: "All Junctions" });
            
            // UI Change to Active Call
            document.querySelector('.call-status').innerText = "00:01 - Route Acknowledged";
            document.querySelector('.call-status').style.color = "#22c55e";
            document.querySelector('.urgent-msg').innerHTML = "Lane clearance in progress.<br>Monitoring inbound tracking...";
            document.querySelector('.urgent-msg').style.color = "#86efac";
            document.querySelector('.urgent-msg').style.borderColor = "#22c55e";
            document.querySelector('.urgent-msg').style.background = "rgba(34, 197, 94, 0.1)";
            
            // Hide buttons
            document.querySelector('.actions').style.display = 'none';
            document.querySelector('.avatar').style.animation = 'none';
        }

        function declineCall() {
            document.getElementById('call').style.display = 'none';
            document.getElementById('idle').style.display = 'flex';
        }
    </script>
</body>
</html>
